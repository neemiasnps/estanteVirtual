<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Cadastro de eBook</title>

    <!-- Materialize CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- CSS -->
    <link href="/css/styles.css" rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <div class="nav-wrapper custom-navbar">
            <a href="/" class="brand-logo custom-logo">
                <img src="/images/logo.png" alt="Logo">
            </a>
        </div>
    </nav>

    <!-- CONTAINER -->
    <div class="container">

        <!-- TÍTULO -->
        <div class="row">
            <div class="col s12">
                <h5 id="form-title">Cadastrar eBook</h5>
                <p id="form-subtitle">Preencha os dados do eBook</p>
            </div>
        </div>

        <!-- FORMULÁRIO -->
        <div class="row">
            <form class="col s12" id="form-ebook">

                <!-- ID (edição futura) -->
                <input type="hidden" id="ebook-id">

                <div class="row">

                    <!-- TÍTULO -->
                    <div class="input-field col s12">
                        <i class="material-icons prefix">book</i>
                        <input id="titulo" type="text" required>
                        <label for="titulo">Título</label>
                    </div>

                    <!-- AUTOR -->
                    <div class="input-field col s12">
                        <i class="material-icons prefix">person</i>
                        <input id="autor" type="text" required>
                        <label for="autor">Autor</label>
                    </div>

                    <!-- GÊNERO -->
                    <div class="input-field col s12 m6">
                        <i class="material-icons prefix">category</i>
                        <select id="genero" required>
                            <option value="" disabled selected>Escolha o gênero</option>
                        </select>
                        <label>Gênero</label>
                    </div>

                    <!-- SUBGÊNERO -->
                    <div class="input-field col s12 m6">
                        <i class="material-icons prefix">category</i>
                        <select id="subgenero" required>
                            <option value="" disabled selected>Escolha o subgênero</option>
                        </select>
                        <label>Subgênero</label>
                    </div>

                    <!-- ANO -->
                    <div class="input-field col s12 m6">
                        <i class="material-icons prefix">date_range</i>
                        <input id="anoPublicacao" type="number" required>
                        <label for="anoPublicacao">Ano de Publicação</label>
                    </div>

                    <!-- EDITORA -->
                    <div class="input-field col s12 m6">
                        <i class="material-icons prefix">business</i>
                        <input id="editora" type="text" required>
                        <label for="editora">Editora</label>
                    </div>

                    <!-- FOTO -->
                    <div class="input-field col s12">
                        <i class="material-icons prefix">image</i>
                        <input id="foto" type="text" required>
                        <label for="foto">URL da Foto</label>
                    </div>

                    <!-- URL DO ARQUIVO -->
                    <div class="input-field col s12">
                        <i class="material-icons prefix">cloud_download</i>
                        <input id="url" type="text" required>
                        <label for="url">URL do Arquivo</label>
                    </div>

                    <!-- SINOPSE -->
                    <div class="input-field col s12">
                        <i class="material-icons prefix">description</i>
                        <textarea id="sinopse" class="materialize-textarea" required></textarea>
                        <label for="sinopse">Sinopse</label>
                    </div>

                    <!-- SITUAÇÃO -->
                    <div class="input-field col s12">
                        <div class="switch">
                            <label>
                                Indisponível
                                <input id="situacao" type="checkbox" checked>
                                <span class="lever"></span>
                                Disponível
                            </label>
                        </div>
                    </div>

                </div>

                <!-- BOTÕES -->
                <div class="row">
                    <div class="col s12 right-align">

                        <button class="btn blue waves-effect waves-light" type="submit">
                            Salvar
                            <i class="material-icons right">save</i>
                        </button>

                        <a href="/gerenciar_ebooks" class="btn grey">
                            Cancelar
                            <i class="material-icons right">arrow_back</i>
                        </a>

                    </div>
                </div>

            </form>
        </div>

    </div>

    <!-- SCRIPTS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script src="/js/ebook_form.js"></script>
    <script src="/js/auth.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            M.FormSelect.init(document.querySelectorAll('select'));
        });
    </script>

</body>

</html>
